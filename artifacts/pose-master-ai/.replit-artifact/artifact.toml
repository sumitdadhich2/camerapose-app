kind = "mobile"
previewPath = "/"
title = "Pose Master AI"
version = "1.0.0"
id = "artifacts/pose-master-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20632

[services.development]
run = "pnpm --filter @workspace/pose-master-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pose-master-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pose-master-ai", "run", "serve" ]

[services.env]
PORT = "20632"
BASE_PATH = "/"
